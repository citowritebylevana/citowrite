local_backend: true

editor:
 preview: false

backend:
  name: git-gateway
  repo: strataacademybylevana/strataacademy-staging
  branch: main
  identity_url: https://auth.decapbridge.com/sites/d25aa2d9-287d-4ad5-9527-0eae898d7586
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://strataacademy.online

# Add site links in Decap CMS (optional)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "homepage_sections"
    label: "Edit Halaman Home"
    files:
      # --- FILE 1: HERO ---
      - name: "hero"  # <--- Nama entry ini 'hero'
        label: "1. Hero Section"
        file: "content/hero.md"
        fields:
          - { label: "Headline", name: "title", widget: "text" }
          - { label: "Subheadline", name: "subtitle", widget: "text" }

      # --- FILE 2: ABOUT (Keluarkan dari 'fields' hero, buat sejajar) ---
      - name: "about"
        label: "2. About Section"
        file: "content/about.md" # Simpan di file terpisah
        fields:
          - { label: "Paragraf 1", name: "paragraf_1", widget: "text" }
          - { label: "Paragraf 2", name: "paragraf_2", widget: "text" }

      # --- FILE 3: COHORT ---
      - name: "cohort"
        label: "3. Cohort Section"
        file: "content/cohort.md"
        fields:
          - label: "Daftar Paket"
            name: "packages"
            widget: "list"
            summary: "{{title}} - Rp {{price}}"
            fields:
              - { label: "Judul Paket", name: "title", widget: "string" }
              - { label: "Deskripsi", name: "description", widget: "text" }
              - { label: "Harga", name: "price", widget: "number" }
              - { label: "Tautan", name: "link", widget: "string" }
              - label: "Fitur"
                name: "features"
                widget: "list"
                summary: "{{fields.item}}"
                field: { label: "Item", name: "item", widget: "string" }
              - { label: "Populer?", name: "isPopular", widget: "boolean", default: false }

      # --- FILE 4: PRIVATE ---
      - name: "private_section"
        label: "4. Private Class"
        file: "content/private.md"
        fields:
          - label: "Daftar Paket"
            name: "packages"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Deskripsi", name: "description", widget: "text" }
              - label: "Fitur"
                name: "features"
                widget: "list"
                summary: "{{fields.item}}"
                field: { label: "Item", name: "item", widget: "string" }

      # --- FILE 5: TESTIMONIAL ---
      - name: "testimonial"
        label: "5. Testimonial"
        file: "content/testimonial.md"
        fields:
          - label: "Daftar Testimoni"
            name: "items"
            widget: "list"
            summary: "{{name}} - {{role}}"
            fields:
              - { label: "Konten", name: "content", widget: "text" }
              - { label: "Nama", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }

      # --- FILE 6: FAQ ---
      - name: "faq_section"
        label: "6. FAQ"
        file: "content/faq.md"
        fields:
          - label: "Daftar Pertanyaan"
            name: "faqs"
            widget: "list"
            summary: "{{question}}"
            fields:
              - { label: "Pertanyaan", name: "question", widget: "string" }
 
