editor:
  preview: false

# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: citowritebylevana/citowrite
  branch: main
  identity_url: https://auth.decapbridge.com/sites/5310c4c7-c285-44ae-82a5-7b3a64001931
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://citowrite.vercel.app

# Add site links in Decap CMS (optional)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "homepage_sections"
    label: "Edit Halaman Home"
    files:
      # --- FILE 1: HERO ---
      - name: "hero"
        label: "1. Hero Section"
        file: "contents/hero.md"
        fields:
          - { label: "Headline", name: "title", widget: "string" }
          - { label: "Subheadline", name: "subtitle", widget: "text" }

      # --- FILE 2: ABOUT ---
      - name: "about"
        label: "2. About Section"
        file: "contents/about.md"
        fields:
          - { label: "Judul", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Statistik"
            name: "stats"
            widget: "list"
            summary: "{{fields.value}} {{fields.label}}"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Nilai", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      # --- FILE 3: PROCESS ---
      - name: "process"
        label: "3. Process Section"
        file: "contents/process.md"
        fields:
          - { label: "Judul", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Langkah-langkah"
            name: "steps"
            widget: "list"
            summary: "{{fields.number}}. {{fields.title}}"
            fields:
              - { label: "Nomor", name: "number", widget: "string" }
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Deskripsi", name: "description", widget: "text" }

      # --- FILE 4: PRICING ---
      - name: "pricing"
        label: "4. Pricing Section"
        file: "contents/pricing.md"
        fields:
          - { label: "Judul", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Paket Harga"
            name: "cards"
            widget: "list"
            summary: "{{fields.title}} - {{fields.price}}"
            fields:
              - { label: "Judul Paket", name: "title", widget: "string" }
              - { label: "Deskripsi", name: "description", widget: "text" }
              - { label: "Harga", name: "price", widget: "string" }
              - label: "Fitur"
                name: "features"
                widget: "list"
                summary: "{{fields.item}}"
                field: { label: "Item", name: "item", widget: "string" }
              - {
                  label: "Populer?",
                  name: "isHighlighted",
                  widget: "boolean",
                  default: false,
                }

      # --- FILE 5: TESTIMONIAL ---
      - name: "testimonial"
        label: "5. Testimonial Section"
        file: "contents/testimonial.md"
        fields:
          - { label: "Judul", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Daftar Testimoni"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}} - {{fields.role}}"
            fields:
              - { label: "Konten", name: "content", widget: "text" }
              - { label: "Nama", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Gambar", name: "image", widget: "image" }

      # --- FILE 6: FAQ ---
      - name: "faq"
        label: "6. FAQ Section"
        file: "contents/faq.md"
        fields:
          - { label: "Judul", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Daftar Pertanyaan"
            name: "faqs"
            widget: "list"
            summary: "{{fields.question}}"
            fields:
              - { label: "Pertanyaan", name: "question", widget: "string" }
              - { label: "Jawaban", name: "answer", widget: "text" }

      # --- FILE 7: CONTACT ---
      - name: "contact"
        label: "7. Contact Section"
        file: "contents/contact.md"
        fields:
          - { label: "Judul", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Daftar Kontak"
            name: "contacts"
            widget: "list"
            summary: "{{fields.title}}: {{fields.value}}"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Nilai", name: "value", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }

      # --- FILE 8: LOGO MARQUEE ---
      - name: "logomarquee"
        label: "8. Logo Marquee Section"
        file: "contents/logomarquee.md"
        fields:
          - { label: "Judul", name: "title", widget: "string" }
          - label: "Daftar Logo"
            name: "brands"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Nama", name: "name", widget: "string" }
              - { label: "Gambar", name: "image", widget: "image" }

      # --- FILE 9: FOOTER ---
      - name: "footer"
        label: "9. Footer Section"
        file: "contents/footer.md"
        fields:
          - { label: "Deskripsi", name: "description", widget: "text" }
          - label: "Social Media"
            name: "socials"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Nama", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
